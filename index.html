<script>
var lastHeight = 0;
var rafId = null;

function notifyHeight() {
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(function() {
    /* Temporarily allow scroll to measure true height */
    document.documentElement.style.overflow = 'visible';
    document.body.style.overflow = 'visible';

    var h = Math.max(
      document.body.scrollHeight,
      document.body.offsetHeight,
      document.documentElement.scrollHeight,
      document.documentElement.offsetHeight
    );

    /* Lock it back immediately */
    document.documentElement.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';

    if (h > 50 && h !== lastHeight) {
      lastHeight = h;
      window.parent.postMessage({ type: 'iwResize', height: h }, '*');
    }
  });
}

document.querySelectorAll('img').forEach(function(img) {
  img.addEventListener('load', notifyHeight);
  img.addEventListener('error', notifyHeight);
});

if (window.ResizeObserver) {
  new ResizeObserver(notifyHeight).observe(document.documentElement);
  new ResizeObserver(notifyHeight).observe(document.body);
}

if (window.MutationObserver) {
  new MutationObserver(notifyHeight).observe(document.body, {
    childList: true, subtree: true, attributes: true, characterData: true
  });
}

window.addEventListener('resize', notifyHeight);

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'requestHeight') {
    lastHeight = 0;
    notifyHeight();
  }
});

document.addEventListener('DOMContentLoaded', notifyHeight);
window.addEventListener('load', function() {
  notifyHeight();
  [100, 300, 600, 1000, 1500, 2500, 4000].forEach(function(t) {
    setTimeout(notifyHeight, t);
  });
});
</script>
